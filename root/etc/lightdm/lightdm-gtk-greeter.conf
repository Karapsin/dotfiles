[greeter]
background=/usr/share/backgrounds/current_wallpaper.png
user-background=false
theme-name=Dotfiles-DarkBlue
icon-theme-name=Adwaita
font-name=Noto Sans 11
xft-antialias=true
xft-hintstyle=slight
xft-rgba=rgb
position=50%,center 50%,center
panel-position=bottom
clock-format=%a %d %b, %H:%M
indicators=~host;~spacer;~clock;~spacer;~layout;~session;~power
keyboard-layouts=us;ru
round-user-image=true
highlight-logged-user=true
transition-duration=350
transition-type=ease-in-out
screensaver-timeout=60
