[colors]
background = #151b24
background-alt = #173348
foreground = #d7dde4
primary = #9ccfd8
secondary = #f5c76f
alert = #d26a6a
disabled = #8a949e

[layout]
dpi = ${env:POLYBAR_DPI:96}
bar-height = ${env:POLYBAR_BAR_HEIGHT:28pt}
line-size = ${env:POLYBAR_LINE_SIZE:3pt}
border-size = ${env:POLYBAR_BORDER_SIZE:0pt}
padding-left = ${env:POLYBAR_PADDING_LEFT:1}
padding-right = ${env:POLYBAR_PADDING_RIGHT:1}
module-margin = ${env:POLYBAR_MODULE_MARGIN:1}
font-0 = ${env:POLYBAR_FONT_0:Noto Sans Mono,Liberation Mono,DejaVu Sans Mono:size=11;2}
font-1 = ${env:POLYBAR_FONT_1:Font Awesome 7 Free:style=Solid:size=11;2}
font-2 = ${env:POLYBAR_FONT_2:Symbols Nerd Font Mono:size=12;2}
tray-margin = ${env:POLYBAR_TRAY_MARGIN:6pt}
tray-padding = ${env:POLYBAR_TRAY_PADDING:2pt}
tray-spacing = ${env:POLYBAR_TRAY_SPACING:8pt}

[bar/example]
width = 100%
height = ${layout.bar-height}
radius = 0
monitor = ${env:MONITOR:}

dpi = ${layout.dpi}

background = ${colors.background}
foreground = ${colors.foreground}

line-size = ${layout.line-size}

border-size = ${layout.border-size}
border-color = #00000000

padding-left = ${layout.padding-left}
padding-right = ${layout.padding-right}

module-margin = ${layout.module-margin}

separator = |
separator-foreground = ${colors.disabled}

font-0 = ${layout.font-0}
font-1 = ${layout.font-1}
font-2 = ${layout.font-2}


modules-left = powermenu xworkspaces xwindow
modules-right = memory cpu gpu tray xkeyboard calendar

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

bottom = true

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

[module/tray]
type = internal/tray

format-margin = ${layout.tray-margin}
tray-size = 68%
tray-padding = ${layout.tray-padding}
tray-spacing = ${layout.tray-spacing}
tray-background = ${colors.background}

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/powermenu]
type = custom/text
format = ÔÄĎ
click-left = $HOME/.config/polybar/powermenu.sh

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/volume]
type = internal/volume
format-volume = "ÔÄ® %percentage%%"
format-muted = "ÔÄ¶ mute"

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

format = <label-layout><label-indicator>
label-layout = %name%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}
label-indicator-on = %name%

[module/memory]
type = custom/script
interval = 2
exec = $HOME/.config/polybar/ram.sh
format-prefix = "RAM "
format-prefix-foreground = ${colors.primary}

[module/cpu]
type = custom/script
interval = 2
exec = $HOME/.config/polybar/cpu.sh
format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}

[module/gpu]
type = custom/script
interval = 2
exec = $HOME/.config/polybar/gpu.sh
format-prefix = "GPU "
format-prefix-foreground = ${colors.primary}

[network-base]
type = internal/network
interval = 3
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#9ccfd8}%ifname%%{F#8a949e} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = %{F#9ccfd8}%ifname%%{F-} %essid% %local_ip%

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#9ccfd8}%ifname%%{F-} %local_ip%

[module/calendar]
type = internal/date
interval = 1
date = %Y-%m-%d
time = %H:%M:%S
label = %{A1:$HOME/.config/polybar/calendar.sh --popup:}%date% %time%%{A}

#[module/battery]
#type = internal/battery

#battery = BAT0
#adapter = AC

#poll-interval = 5
#full-at = 98
#low-at = 20

#format-charging = <label-charging>
#format-discharging = <label-discharging>
#format-full = <label-full>

#label-charging = BAT:%percentage%%
#label-discharging = BAT:%percentage%%
#label-full = BAT: FULL

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
