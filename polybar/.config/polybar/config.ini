[colors]
background = #282A2E
background-alt = #373B41
foreground = #C5C8C6
primary = #F0C674
secondary = #8ABEB7
alert = #A54242
disabled = #707880

[bar/example]
width = 100%
height = 24pt
radius = 0
monitor = ${env:MONITOR:}

; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 0pt
border-color = #00000000

padding-left = 0
padding-right = 1

module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

font-0 = "monospace:size=10;2"
font-1 = "Font Awesome 7 Free:style=Solid:size=10;2"
font-2 = "Symbols Nerd Font Mono:size=10;2"


modules-left = powermenu xworkspaces xwindow
modules-right = memory cpu tray xkeyboard calendar

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

bottom = true

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

[module/tray]
type = internal/tray

format-margin = 8pt
tray-spacing = 16pt

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/powermenu]
type = custom/menu
expand-right = true
format = <label-toggle><menu>

; Make the toggle explicitly clickable using action strings:
label-open  = %{A1:#powermenu.open.0:}ÔÄĎ%{A}
label-close = %{A1:#powermenu.close:}ÔÄĎ%{A}
label-separator = " | "

menu-0-0 = ÔÄ° reboot
menu-0-0-exec = systemctl reboot

menu-0-1 = ÔÄĎ poweroff
menu-0-1-exec = systemctl poweroff

menu-0-2 = logout
menu-0-2-exec = i3-msg exit

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/volume]
type = internal/volume
format-volume = "ÔÄ® %percentage%%"
format-muted = "ÔÄ¶ mute"

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[network-base]
type = internal/network
interval = 3
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = %{F#F0C674}%ifname%%{F-} %essid% %local_ip%

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#F0C674}%ifname%%{F-} %local_ip%

[module/calendar]
type = internal/date
interval = 1
date = %Y-%m-%d
time = %H:%M:%S
label = %{A1:/home/kardinal/.config/polybar/calendar.sh --popup:}%date% %time%%{A}

#[module/battery]
#type = internal/battery

#battery = BAT0
#adapter = AC

#poll-interval = 5
#full-at = 98
#low-at = 20

#format-charging = <label-charging>
#format-discharging = <label-discharging>
#format-full = <label-full>

#label-charging = BAT:%percentage%%
#label-discharging = BAT:%percentage%%
#label-full = BAT: FULL

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
